services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: lightsale
      POSTGRES_PASSWORD: lightsale
      POSTGRES_DB: lightsale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightsale -d lightsale"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
